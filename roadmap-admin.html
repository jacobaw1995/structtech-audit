<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap Builder | StructTech Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0f1e; --card:#111827; --card2:#0f172a; --border:#1e293b; --orange:#f97316;
      --blue:#3b82f6; --green:#22c55e; --white:#f8fafc; --gray:#94a3b8; --muted:#64748b;
      --mono:'DM Mono',monospace; --head:'Bebas Neue',sans-serif; --body:'DM Sans',sans-serif; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--white); font-family:var(--body); padding:24px 16px 100px; }
    .wrap { max-width:680px; margin:0 auto; }
    h1 { font-family:var(--head); font-size:32px; letter-spacing:0.04em; margin-bottom:4px; }
    h1 span { color:var(--orange); }
    .sub { font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:0.14em; margin-bottom:24px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:16px; }
    .card h2 { font-family:var(--mono); font-size:11px; letter-spacing:0.14em; color:var(--orange); margin-bottom:14px; }
    label { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.1em; color:var(--gray); margin:10px 0 4px; }
    input, textarea, select { width:100%; background:var(--card2); border:1px solid var(--border); border-radius:8px;
      color:var(--white); font-family:var(--body); font-size:14px; padding:10px 12px; outline:none; }
    input:focus, textarea:focus { border-color:var(--orange); }
    textarea { resize:vertical; min-height:54px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .row3 { display:grid; grid-template-columns:2fr 1fr 1fr; gap:12px; }
    .mile-row { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
    .mile-row input[type=text] { flex:1; }
    .mile-row select { width:150px; flex-shrink:0; }
    .mile-row button { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px; }
    .mile-row button:hover { color:#ef4444; }
    .add-btn { background:var(--card2); border:1px dashed var(--border); color:var(--gray); border-radius:8px;
      padding:9px; width:100%; font-family:var(--mono); font-size:11px; letter-spacing:0.1em; cursor:pointer; margin-top:4px; }
    .add-btn:hover { border-color:var(--orange); color:var(--orange); }
    .go { background:var(--orange); color:#fff; border:none; border-radius:10px; width:100%;
      padding:16px; font-family:var(--body); font-weight:700; font-size:15px; letter-spacing:0.04em; cursor:pointer; margin-top:8px; }
    .go:hover { background:#fb923c; }
    .go:disabled { opacity:0.5; cursor:wait; }
    #result { display:none; background:rgba(34,197,94,0.08); border:1px solid var(--green); border-radius:12px; padding:18px; margin-top:16px; }
    #result h3 { font-family:var(--mono); font-size:11px; letter-spacing:0.12em; color:var(--green); margin-bottom:10px; }
    #result a { color:var(--white); word-break:break-all; font-size:13px; display:block; margin-bottom:10px; }
    #result .lbl { font-family:var(--mono); font-size:10px; color:var(--gray); letter-spacing:0.1em; margin-bottom:2px; }
    .copy { background:var(--card2); border:1px solid var(--border); color:var(--gray); border-radius:6px;
      font-family:var(--mono); font-size:10px; padding:5px 12px; cursor:pointer; margin-bottom:12px; }
    .copy:hover { color:var(--white); border-color:var(--gray); }
  </style>
</head>
<body>
<div class="wrap">
  <h1>ROADMAP <span>BUILDER</span></h1>
  <div class="sub">STRUCTTECH ADMIN — CREATE A CLIENT ROADMAP</div>

  <div class="card">
    <h2>CLIENT INFO</h2>
    <div class="row">
      <div><label>NAME</label><input id="c_name" placeholder="Fred Miller"></div>
      <div><label>COMPANY</label><input id="c_company" placeholder="Miller Concrete Co"></div>
    </div>
    <div class="row3">
      <div><label>TRADE</label><input id="c_trade" placeholder="Concrete"></div>
      <div><label>CREW SIZE</label><input id="c_crew" type="number" placeholder="12"></div>
      <div><label>SCAN SCORE</label><input id="c_score" type="number" placeholder="30"></div>
    </div>
    <div class="row">
      <div><label>RISK LEVEL</label><input id="c_risk" placeholder="CRITICAL"></div>
      <div><label>MONTHLY LEAK ($)</label><input id="c_leak" type="number" placeholder="9900"></div>
    </div>
  </div>

  <div id="levels"></div>

  <button class="go" id="createBtn" onclick="createRoadmap()">CREATE ROADMAP →</button>

  <div id="result">
    <h3>✓ ROADMAP CREATED</h3>
    <div class="lbl">CLIENT LINK (send this)</div>
    <a id="clientLink" target="_blank"></a>
    <button class="copy" onclick="copyLink('clientLink')">COPY CLIENT LINK</button>
    <div class="lbl">YOUR ADMIN LINK (bookmark this — you can check off everything)</div>
    <a id="adminLink" target="_blank"></a>
    <button class="copy" onclick="copyLink('adminLink')">COPY ADMIN LINK</button>
  </div>
</div>

<script>
var SUPA_URL = 'https://ejlhrykcdfcyeooooodx.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqbGhyeWtjZGZjeWVvb29vb2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzYyODM2OTUsImV4cCI6MjA1MTg1OTY5NX0.dLa4yCf6yIhOiFd0DjsHv0kMpBLaQS63m9fDLQtAsgQ';

var LEVEL_DEFAULTS = [
  { tag:'LEVEL 1 — STOP THE BLEEDING' },
  { tag:'LEVEL 2 — BUILD THE SYSTEM' },
  { tag:'LEVEL 3 — LOCK IT IN & SCALE' }
];

function levelCard(i) {
  return '<div class="card" data-level="' + i + '">' +
    '<h2>' + LEVEL_DEFAULTS[i].tag + '</h2>' +
    '<label>FOCUS AREA TITLE</label><input class="lvl-title" placeholder="e.g. Same-Day Invoicing System">' +
    '<label>WHY THIS MATTERS (1-2 sentences, shown to client)</label>' +
    '<textarea class="lvl-why" placeholder="Every day an invoice sits unsent is a day you\'re funding your client\'s business instead of yours."></textarea>' +
    '<label>MILESTONES</label>' +
    '<div class="miles"></div>' +
    '<button class="add-btn" onclick="addMile(this)">+ ADD MILESTONE</button>' +
    '</div>';
}

function mileRow(label, owner) {
  var d = document.createElement('div');
  d.className = 'mile-row';
  d.innerHTML = '<input type="text" placeholder="Milestone" value="' + (label||'') + '">' +
    '<select><option value="jacob"' + (owner!=='client'?' selected':'') + '>StructTech builds</option>' +
    '<option value="client"' + (owner==='client'?' selected':'') + '>Client homework</option></select>' +
    '<button onclick="this.parentNode.remove()">×</button>';
  return d;
}

function addMile(btn, label, owner) {
  btn.parentNode.querySelector('.miles').appendChild(mileRow(label, owner));
}

// build 3 level cards with 3 starter milestone rows each
var lv = document.getElementById('levels');
for (var i = 0; i < 3; i++) lv.innerHTML += levelCard(i);
document.querySelectorAll('.card[data-level]').forEach(function(c){
  for (var j = 0; j < 3; j++) c.querySelector('.miles').appendChild(mileRow());
});

function createRoadmap() {
  var levels = [];
  var ok = true;
  document.querySelectorAll('.card[data-level]').forEach(function(c, i){
    var title = c.querySelector('.lvl-title').value.trim();
    if (!title) ok = false;
    var milestones = [];
    c.querySelectorAll('.mile-row').forEach(function(r, j){
      var label = r.querySelector('input').value.trim();
      if (!label) return;
      milestones.push({ id:'l'+i+'m'+j, label:label, owner:r.querySelector('select').value, done:false, done_at:null });
    });
    if (!milestones.length) ok = false;
    levels.push({ title:title, why:c.querySelector('.lvl-why').value.trim(), milestones:milestones });
  });

  var name = document.getElementById('c_name').value.trim();
  var company = document.getElementById('c_company').value.trim();
  if (!name || !company || !ok) { alert('Fill in client name, company, every level title, and at least one milestone per level.'); return; }

  var payload = {
    client_name: name,
    company: company,
    trade: document.getElementById('c_trade').value.trim() || null,
    crew_size: parseInt(document.getElementById('c_crew').value) || null,
    score: parseInt(document.getElementById('c_score').value) || null,
    risk_level: document.getElementById('c_risk').value.trim() || null,
    revenue_leak_monthly: parseInt(document.getElementById('c_leak').value) || null,
    levels: levels
  };

  var btn = document.getElementById('createBtn');
  btn.disabled = true; btn.textContent = 'CREATING…';

  fetch(SUPA_URL + '/rest/v1/client_roadmaps', {
    method:'POST',
    headers:{ 'apikey':SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY, 'Content-Type':'application/json', 'Prefer':'return=representation' },
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.json(); })
  .then(function(rows){
    btn.disabled = false; btn.textContent = 'CREATE ROADMAP →';
    var row = rows[0];
    if (!row || !row.token) { alert('Something went wrong. Check console.'); console.log(rows); return; }
    var base = location.origin + location.pathname.replace('roadmap-admin.html','roadmap.html');
    var clientUrl = base + '?c=' + row.token;
    var adminUrl  = clientUrl + '&admin=jw937';
    document.getElementById('clientLink').textContent = clientUrl;
    document.getElementById('clientLink').href = clientUrl;
    document.getElementById('adminLink').textContent = adminUrl;
    document.getElementById('adminLink').href = adminUrl;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior:'smooth' });
  })
  .catch(function(e){ btn.disabled = false; btn.textContent = 'CREATE ROADMAP →'; alert('Error: ' + e.message); });
}

function copyLink(id) {
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  event.target.textContent = '✓ COPIED';
  setTimeout(function(){ event.target.textContent = event.target.id === 'clientLink' ? 'COPY CLIENT LINK' : 'COPY LINK'; }, 1500);
}
</script>
</body>
</html>
